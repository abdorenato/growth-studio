name: Supabase Keepalive

# Pinga o endpoint /api/health/keepalive periodicamente pra evitar que o
# Supabase pause o database depois de 7 dias sem atividade (limite do free).
# Roda a cada 3 dias as 12:00 UTC (margem de seguranca confortavel).
# Tambem pode ser disparado manualmente em Actions > Run workflow.

on:
  schedule:
    - cron: "0 12 */3 * *" # min hr day-of-month month day-of-week
  workflow_dispatch: # botao "Run workflow" no GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit keepalive endpoint
        env:
          # Pode override via Settings > Secrets > Actions > KEEPALIVE_URL
          # Default: producao do projeto
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL || 'https://growth-studio.vercel.app/api/health/keepalive' }}
        run: |
          echo "Pinging $KEEPALIVE_URL"
          response=$(curl -fsSL --max-time 30 "$KEEPALIVE_URL" || echo "FAIL")
          if [ "$response" = "FAIL" ]; then
            echo "::error::Keepalive falhou — endpoint nao respondeu"
            exit 1
          fi
          echo "Resposta: $response"
          # Verifica se tem "ok":true na resposta
          if echo "$response" | grep -q '"ok":true'; then
            echo "Database vivo OK"
          else
            echo "::warning::Endpoint respondeu mas sem ok=true"
            echo "$response"
            exit 1
          fi
